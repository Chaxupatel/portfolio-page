<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="crt-overlay"></div>
    
    <div class="terminal-container" id="terminal">
        <div id="output"></div>
        <div class="input-line" id="input-line">
            <span class="prompt">guest@portfolio:~$</span>
            <span id="input-text"></span><span class="cursor">_</span>
        </div>
        <!-- Hidden input to capture keyboard events reliably, especially on mobile -->
        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" autofocus>
    </div>

    <!-- Hidden Data for Portfolio -->
